<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiti-Wizard — Hybrid Memory Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧙 Eiti-Wizard</h1>
        <p class="subtitle">Персональный AI-ассистент с гибридной биологической памятью</p>
        
        <!-- Основной чат -->
        <div id="chat-container">
            <div id="chat-messages"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Напишите сообщение...">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
        
        <!-- Статус гибридной памяти -->
        <div id="hybrid-status" class="status-panel">
            <h3>🧬 Статус гибридной памяти</h3>
            <div id="status-content">Загрузка...</div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
